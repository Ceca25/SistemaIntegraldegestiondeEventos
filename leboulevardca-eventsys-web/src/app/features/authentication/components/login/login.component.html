<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 via-indigo-500 to-purple-600 p-6">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 space-y-6">
    <!-- Header -->
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-gray-800">Bienvenido</h2>
      <p class="text-gray-500 mt-2">Inicia sesión para continuar</p>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700">Usuario</label>
        <input type="text" [(ngModel)]="username" name="username" required
               class="mt-1 w-full px-4 py-2 border rounded-lg shadow-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" required
               class="mt-1 w-full px-4 py-2 border rounded-lg shadow-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
      </div>

      <button type="submit"
              class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md transition duration-300">
        Iniciar Sesión
      </button>
    </form>

    <!-- Footer -->
    <p class="text-center text-sm text-gray-600">
      ¿No tienes cuenta?
      <a routerLink="/register" class="text-indigo-600 font-medium hover:underline">
        Regístrate aquí
      </a>
    </p>

    <!-- Mensajes -->
    <p *ngIf="errorMessage" class="text-red-500 text-sm text-center mt-3">
      {{ errorMessage }}
    </p>
  </div>
</div>
