<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-green-400 via-emerald-500 to-teal-600 p-6">
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-8 space-y-6">
    <!-- Header -->
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-gray-800">Crear Cuenta</h2>
      <p class="text-gray-500 mt-2">Completa los datos para registrarte</p>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="space-y-4">
    <div class="grid grid-cols-2 gap-4">
        <input type="text" [(ngModel)]="form.nombres" name="nombres" placeholder="Nombres" required
               class="w-full px-4 py-2 border rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none">

        <input type="text" [(ngModel)]="form.apellidos" name="apellidos" placeholder="Apellidos" required
               class="w-full px-4 py-2 border rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none">
      </div>

      <input type="text" [(ngModel)]="form.numeroDocumento" name="numeroDocumento" placeholder="Número de Documento" required
             class="w-full px-4 py-2 border rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none">

      <!-- Combo Género -->
      <select [(ngModel)]="form.id_genero" name="id_genero"
              class="w-full px-4 py-2 border rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none">
        <option value="">Selecciona un Género</option>
        <option *ngFor="let genero of generos" [value]="genero.id">
          {{ genero.nombre }}
        </option>
      </select>

      <!-- Combo Estado Civil -->
      <select [(ngModel)]="form.id_estado_civil" name="id_estado_civil"
              class="w-full px-4 py-2 border rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none">
        <option value="">Selecciona un Estado Civil</option>
        <option *ngFor="let estado of estadosCiviles" [value]="estado.id">
          {{ estado.nombre }}
        </option>
      </select>

      <input type="text" [(ngModel)]="form.username" name="username" placeholder="Usuario" required
             class="w-full px-4 py-2 border rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none">

      <input type="email" [(ngModel)]="form.email" name="email" placeholder="Correo" required
             class="w-full px-4 py-2 border rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none">

      <input type="password" [(ngModel)]="form.password" name="password" placeholder="Contraseña" required
             class="w-full px-4 py-2 border rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none">

      <button type="submit"
              class="w-full py-3 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-xl shadow-md transition duration-300">
        Registrarse
      </button>
    </form>

    <!-- Mensajes -->
    <p *ngIf="message" class="text-center text-sm mt-3 text-gray-700">
      {{ message }}
    </p>

    <!-- Footer -->
    <p class="text-center text-sm text-gray-600">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-green-600 font-medium hover:underline">
        Inicia sesión aquí
      </a>
    </p>
  </div>
</div>
