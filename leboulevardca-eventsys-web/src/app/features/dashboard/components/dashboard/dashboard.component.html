<div class="flex h-screen bg-gray-100">

  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-md">
    <div class="p-6 text-2xl font-bold text-indigo-600">
      📊 Dashboard
    </div>
    <nav class="mt-6 space-y-1">
      <button (click)="irAProductos()"
              class="w-full text-left flex items-center px-6 py-3 text-gray-700 hover:bg-indigo-100">
        🛒 <span class="ml-3">Productos</span>
      </button>
      <a routerLink="/cotizacion"
         class="flex items-center px-6 py-3 text-gray-700 hover:bg-indigo-100">
        💵 <span class="ml-3">Cotización</span>
      </a>
      <a routerLink="/clientes"
         class="flex items-center px-6 py-3 text-gray-700 hover:bg-indigo-100">
        👥 <span class="ml-3">Clientes</span>
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col">
    <!-- Top bar -->
    <header class="flex items-center justify-between bg-white shadow px-6 py-4">
      <h1 class="text-xl font-semibold text-gray-700">Bienvenido al Panel</h1>
      <button (click)="logout()" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">
        Cerrar sesión
      </button>
    </header>

    <!-- Content area -->
    <main class="flex-1 p-6">
      <div class="text-gray-600">
        <h2 class="text-2xl font-bold mb-4">Selecciona una opción del menú</h2>
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
